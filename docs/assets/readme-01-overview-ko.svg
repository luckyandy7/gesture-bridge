<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; }
    .title { font-size: 42px; font-weight: 800; fill: #102027; }
    .sub { font-size: 18px; font-weight: 500; fill: #5a6a72; }
    .h { font-size: 24px; font-weight: 800; fill: #102027; }
    .t { font-size: 16px; font-weight: 600; fill: #506169; }
    .small { font-size: 14px; font-weight: 600; fill: #62727a; }
    .chip { font-size: 15px; font-weight: 800; fill: #0f766e; }
  </style>
  <rect width="1200" height="680" rx="34" fill="#F7FAFA"/>
  <circle cx="1060" cy="110" r="118" fill="#D9F3EF"/>
  <circle cx="145" cy="560" r="150" fill="#E7F0FF"/>
  <rect x="52" y="48" width="1096" height="584" rx="30" fill="white" stroke="#D7E2E5"/>

  <text x="96" y="116" class="title">Gesture Bridge 전체 구조</text>
  <text x="98" y="152" class="sub">웹캠과 마이크 입력을 목적별 모드로 나누어 화면 제어, 수화 문장, 웹 체험으로 연결합니다.</text>

  <g transform="translate(82 230)">
    <rect width="260" height="270" rx="24" fill="#F1F7F7" stroke="#CDE1E2"/>
    <text x="28" y="48" class="chip">01 입력</text>
    <text x="28" y="90" class="h">카메라 · 마이크</text>
    <g transform="translate(30 126)">
      <rect width="200" height="38" rx="12" fill="white" stroke="#D9E5E7"/>
      <text x="18" y="25" class="t">웹캠 손동작</text>
      <rect y="52" width="200" height="38" rx="12" fill="white" stroke="#D9E5E7"/>
      <text x="18" y="77" class="t">양손 + 팔 포즈</text>
      <rect y="104" width="200" height="38" rx="12" fill="white" stroke="#D9E5E7"/>
      <text x="18" y="129" class="t">한국어 음성 명령</text>
    </g>
  </g>

  <path d="M365 365H445" stroke="#77AEB2" stroke-width="4" stroke-linecap="round"/>
  <path d="M445 365L429 354V376L445 365Z" fill="#77AEB2"/>

  <g transform="translate(470 230)">
    <rect width="260" height="270" rx="24" fill="#F6F9FF" stroke="#D4DFF3"/>
    <text x="28" y="48" class="chip">02 모드 선택</text>
    <text x="28" y="90" class="h">세 기능 분리</text>
    <g transform="translate(30 126)">
      <rect width="200" height="38" rx="12" fill="white" stroke="#D9E5E7"/>
      <text x="18" y="25" class="t">PC 제어 모드</text>
      <rect y="52" width="200" height="38" rx="12" fill="white" stroke="#D9E5E7"/>
      <text x="18" y="77" class="t">수화 문장 모드</text>
      <rect y="104" width="200" height="38" rx="12" fill="white" stroke="#D9E5E7"/>
      <text x="18" y="129" class="t">인터랙티브 체험</text>
    </g>
  </g>

  <path d="M755 365H835" stroke="#77AEB2" stroke-width="4" stroke-linecap="round"/>
  <path d="M835 365L819 354V376L835 365Z" fill="#77AEB2"/>

  <g transform="translate(858 230)">
    <rect width="260" height="270" rx="24" fill="#F1FBF4" stroke="#CFE8D6"/>
    <text x="28" y="48" class="chip">03 결과</text>
    <text x="28" y="90" class="h">사용자 경험</text>
    <g transform="translate(30 126)">
      <rect width="200" height="38" rx="12" fill="white" stroke="#D9E5E7"/>
      <text x="18" y="25" class="t">마우스 · 스크롤</text>
      <rect y="52" width="200" height="38" rx="12" fill="white" stroke="#D9E5E7"/>
      <text x="18" y="77" class="t">한국어 문장 출력</text>
      <rect y="104" width="200" height="38" rx="12" fill="white" stroke="#D9E5E7"/>
      <text x="18" y="129" class="t">그림 · 게임 · 효과</text>
    </g>
  </g>

  <text x="96" y="574" class="small">핵심 원칙: 수화 번역, 화면 제어, 체험형 인터랙션을 섞지 않고 처음 화면에서 명확히 선택합니다.</text>
</svg>
