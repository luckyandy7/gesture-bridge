<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; }
    .title { font-size: 38px; font-weight: 850; fill: #102027; }
    .sub { font-size: 17px; font-weight: 500; fill: #5d6c73; }
    .h { font-size: 19px; font-weight: 850; fill: #15262D; }
    .cmd { font-size: 14px; font-weight: 800; fill: #0f766e; }
    .t { font-size: 13px; font-weight: 650; fill: #5B6B72; }
  </style>
  <rect width="1200" height="680" rx="34" fill="#F8FAFA"/>
  <rect x="54" y="50" width="1092" height="580" rx="30" fill="white" stroke="#D7E2E5"/>
  <text x="92" y="112" class="title">자주 쓰는 실행 명령</text>
  <text x="94" y="147" class="sub">README를 끝까지 읽기 전에도 바로 실행 흐름을 잡을 수 있는 명령 요약입니다.</text>

  <g transform="translate(92 220)">
    <rect width="318" height="112" rx="20" fill="#F2F8F8" stroke="#CFE1E2"/>
    <text x="24" y="38" class="h">Python 설치</text>
    <text x="24" y="68" class="cmd">pip install -e ".[vision,control,ml,dev]"</text>
    <text x="24" y="94" class="t">카메라, 제어, 학습, 테스트 의존성</text>
  </g>
  <g transform="translate(442 220)">
    <rect width="318" height="112" rx="20" fill="#F6F8FF" stroke="#D5DDF2"/>
    <text x="24" y="38" class="h">프론트 실행</text>
    <text x="24" y="68" class="cmd">pnpm dev</text>
    <text x="24" y="94" class="t">/ 와 /interactive 확인</text>
  </g>
  <g transform="translate(792 220)">
    <rect width="318" height="112" rx="20" fill="#F2FBF5" stroke="#D3E8D8"/>
    <text x="24" y="38" class="h">PC 제어</text>
    <text x="24" y="68" class="cmd">python -m gesture_bridge pc-control</text>
    <text x="24" y="94" class="t">기본은 실제 입력 없는 dry-run</text>
  </g>

  <g transform="translate(92 378)">
    <rect width="318" height="112" rx="20" fill="#FFF8EC" stroke="#E8DCC6"/>
    <text x="24" y="38" class="h">수화 문장</text>
    <text x="24" y="68" class="cmd">python -m gesture_bridge sign-text</text>
    <text x="24" y="94" class="t">gloss 토큰을 한국어 문장으로 출력</text>
  </g>
  <g transform="translate(442 378)">
    <rect width="318" height="112" rx="20" fill="#F7FAFA" stroke="#D7E2E5"/>
    <text x="24" y="38" class="h">문장 리소스</text>
    <text x="24" y="68" class="cmd">prepare-sentence-resources</text>
    <text x="24" y="94" class="t">GKSL, KSL-LEX, 문장 메모리 준비</text>
  </g>
  <g transform="translate(792 378)">
    <rect width="318" height="112" rx="20" fill="#F2F8F8" stroke="#CFE1E2"/>
    <text x="24" y="38" class="h">검증</text>
    <text x="24" y="68" class="cmd">pnpm build · pytest · ruff</text>
    <text x="24" y="94" class="t">푸쉬 전 기본 체크</text>
  </g>

  <text x="94" y="568" class="t">긴 명령과 옵션은 README의 “주요 명령어” 섹션에서 확인합니다.</text>
</svg>
